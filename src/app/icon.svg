<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <!-- SplitMate "Cut Badge" mark (Phase 44): the indigo badge — letters and
       all — sliced once and eased apart, a gold hairline showing in the cut.
       Letterforms are drawn monoline paths (no font dependency). -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1b3e"/>
      <stop offset="1" stop-color="#0d0e22"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5d5df0"/>
      <stop offset="1" stop-color="#33299f"/>
    </linearGradient>
    <linearGradient id="cut" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3d878"/>
      <stop offset="1" stop-color="#c79c2e"/>
    </linearGradient>
    <clipPath id="upper"><polygon points="0,0 96,0 96,34 0,62"/></clipPath>
    <clipPath id="lower"><polygon points="0,64 96,36 96,96 0,96"/></clipPath>
  </defs>

  <rect width="96" height="96" rx="22" fill="url(#tile)"/>
  <line x1="16" y1="59" x2="80" y2="40" stroke="url(#cut)" stroke-width="2.5"/>

  <!-- upper half of the badge, eased up-left -->
  <g clip-path="url(#upper)" transform="translate(-2 -1.5)">
    <rect x="15" y="15" width="66" height="66" rx="17" fill="url(#badge)"/>
    <g fill="none" stroke="#f6f6ff" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M40 41.5 C40 37.5 36.5 35.5 32 35.5 C27.5 35.5 24 38 24 41.5 C24 49 40 47 40 54.5 C40 58 36.5 60.5 32 60.5 C27.5 60.5 24 58.5 24 54.5"/>
      <path d="M50 60.5 V35.5 L61 51 L72 35.5 V60.5"/>
    </g>
  </g>

  <!-- lower half of the badge, eased down-right -->
  <g clip-path="url(#lower)" transform="translate(2 1.5)">
    <rect x="15" y="15" width="66" height="66" rx="17" fill="url(#badge)"/>
    <g fill="none" stroke="#dcdff9" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M40 41.5 C40 37.5 36.5 35.5 32 35.5 C27.5 35.5 24 38 24 41.5 C24 49 40 47 40 54.5 C40 58 36.5 60.5 32 60.5 C27.5 60.5 24 58.5 24 54.5"/>
      <path d="M50 60.5 V35.5 L61 51 L72 35.5 V60.5"/>
    </g>
  </g>
</svg>
